<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resume Template</title>
<style>
:root {
  --navy:#071426; --navy2:#0d2138; --ink:#172033; --muted:#5e6b7d;
  --line:#d8dee8; --paper:#f7f9fc; --white:#ffffff; --gold:#c7a65a;
  --blue:#2e5f93; --soft:#eef2f7;
}
* { box-sizing:border-box; }
html { background:#dfe6f0; }
body { margin:0; font:13.2px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; color:var(--ink); background:#dfe6f0; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
a { color:inherit; text-decoration:none; border-bottom:1px solid rgba(199,166,90,.55); }
.page { max-width:980px; margin:28px auto; background:white; box-shadow:0 24px 90px rgba(7,20,38,.18); }
.hero { display:block; padding:34px 42px 28px; background:linear-gradient(135deg,var(--navy),var(--navy2)); color:white; border-bottom:5px solid var(--gold); }
.eyebrow { color:#d7c38a; letter-spacing:.18em; text-transform:uppercase; font-size:10px; font-weight:800; margin:0 0 10px; }
h1 { margin:0; font-size:38px; line-height:1; letter-spacing:-.035em; }
.headline { margin:10px 0 14px; color:#dbe5f2; font-size:15px; font-weight:650; }
.contact { display:flex; flex-wrap:wrap; gap:8px 14px; color:#dbe5f2; font-size:12px; }
.contact span { display:inline-flex; align-items:center; gap:6px; }
.content { display:grid; grid-template-columns:1fr 285px; gap:30px; padding:30px 42px 38px; }
.section { margin:0 0 22px; }
.section-title { margin:0 0 11px; color:#0c1b2f; font-size:15px; font-weight:800; text-transform:uppercase; letter-spacing:.12em; display:flex; align-items:center; gap:10px; }
.section-title:before { content:""; width:22px; height:3px; background:var(--gold); border-radius:999px; flex:0 0 auto; }
h3 { margin:0; font-size:15.5px; color:#0c1b2f; }
h4 { margin:0 0 7px; font-size:11px; color:#26364d; text-transform:uppercase; letter-spacing:.09em; }
p { margin:0 0 8px; }
ul { margin:8px 0 0 18px; padding:0; }
li { margin:4px 0; }
.summary { padding:16px 18px; background:#f4f7fb; border-left:4px solid var(--gold); border-radius:14px; }
.project, .role, .section-projects > .entry { padding:14px 0; border-bottom:1px solid var(--line); break-inside:avoid; page-break-inside:avoid; }
.project, .section-projects > .entry { padding-bottom:26px; margin-bottom:14px; }
.project:first-of-type, .role:first-of-type, .section-projects > .entry:first-of-type { padding-top:0; }
.project-head { display:flex; justify-content:space-between; gap:12px; align-items:baseline; }
.project-links { color:var(--muted); font-size:11px; white-space:nowrap; }
.chips { display:flex; flex-wrap:wrap; align-items:center; gap:7px; margin:12px 0 12px; }
.chips span { display:inline-flex; align-items:center; justify-content:center; min-height:22px; padding:4px 9px 4px; border-radius:999px; background:#edf2f8; color:#26364d; font-size:10.5px; font-weight:650; line-height:1; text-align:center; vertical-align:middle; }
.chips span:nth-child(3n+1) { background:#f3ead4; color:#614b16; }
.sidebar { border-left:1px solid var(--line); padding-left:24px; }
.card { background:#f7f9fc; border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:14px; }
.edu-item { margin:0 0 16px; }
.edu-degree { display:block; margin-bottom:4px; line-height:1.2; }
.edu-location, .edu-dates, .edu-detail { display:block; margin:0 0 4px; line-height:1.28; }
.edu-location, .edu-dates, .company, .dates { color:var(--muted); }
.edu-detail { color:var(--ink); }
.role { display:grid; grid-template-columns:1fr auto; gap:2px 12px; }
.role ul { grid-column:1 / -1; }
.cert { border:1px solid rgba(199,166,90,.5); background:#fbf6e9; color:#493714; padding:11px 12px; border-radius:14px; font-weight:650; }
@page { size:A4; margin:10mm; }
@media print {
  html, body { background:#fff; font-size:9.2pt; line-height:1.35; }
  .page { margin:0; max-width:none; box-shadow:none; }
  .hero { padding:10mm 11mm 8mm; }
  h1 { font-size:24pt; }
  .headline { font-size:10pt; }
  .content { grid-template-columns:1fr 62mm; gap:8mm; padding:8mm 11mm 10mm; }
  .section { margin-bottom:5mm; }
  .project, .role, .section-projects > .entry { padding:3.6mm 0; }
  .project, .section-projects > .entry { padding-bottom:6.5mm; margin-bottom:3.5mm; }
  .summary { padding:3.5mm 4mm; border-radius:3mm; }
  .card { padding:3.2mm; border-radius:3mm; margin-bottom:3mm; }
  .chips { gap:1.8mm; margin:3mm 0 3mm; }
  .chips span { min-height:5.2mm; font-size:7.2pt; padding:1.6pt 4.8pt; line-height:1; }
}
</style>
</head>
<body>
<main class="page">
  <header class="hero">
    <div>
      <p class="eyebrow">Professional Resume</p>
      <h1>Resume</h1>
      <p class="headline">Professional resume template</p>
    </div>
  </header>
</main>
</body>
</html>
